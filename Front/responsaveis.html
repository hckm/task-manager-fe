<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsáveis — TaskFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="libs/bootstrap-icons/bootstrap-icons.min.css" />
    <style>
      body {
        background: #f0f2f5;
        font-family: inherit;
      }
      .popup-header {
        background: #fff;
        border-bottom: 1px solid #dee2e6;
        padding: 0.75rem 1rem;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .popup-body {
        padding: 1rem;
      }
      .table th {
        font-size: 0.8rem;
        color: #6c757d;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        white-space: nowrap;
      }
      .badge-cargo {
        font-size: 0.75rem;
        font-weight: 500;
        padding: 0.3em 0.7em;
        border-radius: 20px;
      }
      /* Scroll horizontal na tabela em telas estreitas */
      .table-responsive { border-radius: 0.5rem; }

      @media (max-width: 575.98px) {
        .popup-header h5  { font-size: 1rem; }
        .popup-header small { display: none; }
        .popup-header .btn span { display: none; }
      }
    </style>
  </head>
  <body>

    <!-- Header -->
    <div class="popup-header d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-people-fill text-primary fs-5"></i>
        <div>
          <h5 class="mb-0 fw-bold">Responsáveis</h5>
          <small class="text-muted">Gerencie os responsáveis pelas tarefas</small>
        </div>
      </div>
      <div class="d-flex gap-2">
        <button class="btn btn-sm btn-outline-primary" onclick="abrirCargos()" title="Gerenciar Cargos">
          <i class="bi bi-briefcase me-1"></i>Cargos
        </button>
        <button class="btn btn-sm btn-outline-secondary" onclick="fecharModal()" title="Fechar">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
    </div>

    <div class="popup-body">

      <!-- Formulário de cadastro -->
      <div class="card shadow-sm mb-4 p-3">
        <h6 class="fw-bold mb-3">
          <i class="bi bi-person-plus me-1 text-primary"></i>Novo Responsável
        </h6>
        <form id="formResponsavel">
          <!-- Linha 1: Nome + E-mail -->
          <div class="row g-2 mb-2">
            <div class="col-12 col-sm-6">
              <label class="form-label small mb-1">Nome completo</label>
              <input
                type="text"
                id="inp-nome"
                class="form-control form-control-sm"
                placeholder="Ex: João Silva"
                required
              />
            </div>
            <div class="col-12 col-sm-6">
              <label class="form-label small mb-1">E-mail</label>
              <input
                type="email"
                id="inp-email"
                class="form-control form-control-sm"
                placeholder="Ex: joao@email.com"
                required
              />
            </div>
          </div>
          <!-- Linha 2: Cargo + Botão -->
          <div class="row g-2 align-items-end">
            <div class="col-12 col-sm-9">
              <label class="form-label small mb-1">Cargo</label>
              <select id="inp-cargo" class="form-select form-select-sm" required>
                <option value="" disabled selected>Selecionar</option>
              </select>
            </div>
            <div class="col-12 col-sm-3">
              <button type="submit" id="btn-cadastrar" class="btn btn-primary btn-sm w-100">
                <i class="bi bi-plus-lg me-1"></i>Cadastrar
              </button>
            </div>
          </div>
        </form>
      </div>

      <!-- Lista de responsáveis -->
      <div id="listaResponsaveis">
        <div class="text-center text-muted py-5">
          <div class="spinner-border spinner-border-sm text-primary me-2"></div>
          Carregando responsáveis...
        </div>
      </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // const API_BASE_URL  = "http://localhost:8080";
      const API_BASE_URL = "https://task-manager-api-g9-cef2b0a6ceg6b8dr.brazilsouth-01.azurewebsites.net"
      const RESP_ENDPOINT  = `${API_BASE_URL}/api/responsaveis`;
      const CARGOS_ENDPOINT = `${API_BASE_URL}/api/cargos`;

      // ── Cargos ────────────────────────────────────────────────
      async function carregarCargos() {
        const sel = document.getElementById("inp-cargo");
        try {
          const res = await fetch(CARGOS_ENDPOINT);
          if (!res.ok) throw new Error();
          const data = await res.json();
          const lista = Array.isArray(data?.content) ? data.content
                      : Array.isArray(data) ? data : [];
          lista.forEach(c => {
            const opt = document.createElement("option");
            opt.value = c.id;
            opt.textContent = c.descricao;
            sel.appendChild(opt);
          });
        } catch {
          // fallback com cargos fixos
          [{ id: 1, descricao: "Gerente" },
           { id: 2, descricao: "Desenvolvedor" },
           { id: 3, descricao: "Designer" }].forEach(c => {
            const opt = document.createElement("option");
            opt.value = c.id;
            opt.textContent = c.descricao;
            sel.appendChild(opt);
          });
        }
      }

      // ── Listar ────────────────────────────────────────────────
      async function carregarResponsaveis() {
        const div = document.getElementById("listaResponsaveis");
        div.innerHTML = `<div class="text-center text-muted py-5">
          <div class="spinner-border spinner-border-sm text-primary me-2"></div>
          Carregando...</div>`;
        try {
          const res = await fetch(RESP_ENDPOINT);
          if (!res.ok) throw new Error(`Erro ${res.status}`);
          const data = await res.json();
          const lista = Array.isArray(data?.content) ? data.content
                      : Array.isArray(data) ? data : [];

          if (lista.length === 0) {
            div.innerHTML = `<div class="text-center text-muted py-5">
              <i class="bi bi-inbox fs-2 d-block mb-2"></i>
              Nenhum responsável cadastrado.</div>`;
            return;
          }

          div.innerHTML = `
            <div class="card shadow-sm">
              <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                  <thead class="table-light">
                    <tr>
                      <th style="width:50px">#</th>
                      <th>Nome</th>
                      <th>E-mail</th>
                      <th>Cargo</th>
                      <th class="text-end" style="width:60px">Ações</th>
                    </tr>
                  </thead>
                  <tbody id="tbody-responsaveis"></tbody>
                </table>
              </div>
            </div>`;

          const tbody = document.getElementById("tbody-responsaveis");
          lista.forEach(item => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
              <td class="text-muted small">${item.id}</td>
              <td class="fw-semibold">${item.responsavel ?? item.nome ?? "—"}</td>
              <td class="fw-semibold">${item.email ?? "—"}</td>
              <td>
                <span class="badge bg-primary bg-opacity-10 text-primary badge-cargo">
                  ${item.cargo?.descricao ?? "—"}
                </span>
              </td>
              <td class="text-end">
                <button
                  class="btn btn-sm btn-outline-danger"
                  onclick="excluir(${item.id}, this)"
                  title="Excluir responsável"
                >
                  <i class="bi bi-trash"></i>
                </button>
              </td>`;
            tbody.appendChild(tr);
          });
        } catch (err) {
          div.innerHTML = `<div class="alert alert-warning m-0">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>${err.message}</div>`;
        }
      }

      // ── Cadastrar ─────────────────────────────────────────────
      document.getElementById("formResponsavel").addEventListener("submit", async function (e) {
        e.preventDefault();
        const nome    = document.getElementById("inp-nome").value.trim();
        const email   = document.getElementById("inp-email").value.trim();
        const cargo = Number(document.getElementById("inp-cargo").value);
        const btn     = document.getElementById("btn-cadastrar");

        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

        try {
          const res = await fetch(RESP_ENDPOINT, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ responsavel: nome, email, cargo }),
          });
          if (!res.ok) {
            const txt = await res.text();
            throw new Error(txt || `Erro ${res.status}`);
          }
          this.reset();
          await carregarResponsaveis();
          // Atualiza o select de responsáveis na janela principal
          window.parent?.carregarResponsaveisNoSelect?.();
        } catch (err) {
          alert(`Erro ao cadastrar: ${err.message}`);
        } finally {
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-plus-lg me-1"></i>Cadastrar';
        }
      });

      // ── Excluir ───────────────────────────────────────────────
      async function excluir(id, btn) {
        if (!confirm("Tem certeza que deseja excluir este responsável?")) return;
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
        try {
          const res = await fetch(`${RESP_ENDPOINT}/${id}`, { method: "DELETE" });
          if (!res.ok) throw new Error(`Erro ${res.status}`);
          await carregarResponsaveis();
          window.parent?.carregarResponsaveisNoSelect?.();
        } catch (err) {
          alert(`Erro ao excluir: ${err.message}`);
          btn.disabled = false;
          btn.innerHTML = '<i class="bi bi-trash"></i>';
        }
      }

      // ── Init ──────────────────────────────────────────────────
      function fecharModal() {
        if (window.parent?.fecharModalResponsaveis) {
          window.parent.fecharModalResponsaveis();
        } else {
          window.close();
        }
      }

      /** Navega para cargos.html dentro do mesmo iframe */
      function abrirCargos() {
        const iframe = window.parent?.document.getElementById("iframeResponsaveis");
        if (iframe) iframe.src = "Front/cargos.html";
        else window.location.href = "cargos.html";
      }

      /** Recarrega cargos e a lista após mudanças vindas de cargos.html */
      function carregarCargosNoSelect() {
        carregarCargos().then(() => carregarResponsaveis());
      }

      carregarCargos();
      carregarResponsaveis();
    </script>
  </body>
</html>
