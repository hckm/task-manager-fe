<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciador de Tarefas</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="Front/libs/bootstrap-icons/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="Front/style.css" />
  </head>
  <body>
    <div class="container-xl px-3 px-md-4 py-3 py-md-5">
      <!-- Cabeçalho -->
      <header class="text-center mb-4 mb-md-5">
        <h1 class="display-5 display-md-4 fw-bold text-primary">TaskFlow</h1>
        <p class="text-secondary mb-0">Gerenciamento de Tarefas em Equipe</p>
      </header>

      <!-- Layout principal -->
      <div class="row g-4">
        <!-- Coluna formulário -->
        <div class="col-12 col-lg-4">
          <div class="card p-4 shadow-sm card-animation">
            <h4 class="mb-3">Nova Tarefa</h4>
            <form id="taskForm">
              <div class="mb-3">
                <label class="form-label">Título da Tarefa</label>
                <input
                  type="text"
                  id="titulo"
                  class="form-control"
                  placeholder="Título"
                  required
                />
              </div>
              <div class="mb-3">
                <label class="form-label">Descrição</label>
                <textarea
                  id="descricao"
                  class="form-control"
                  rows="2"
                  placeholder="Detalhes da Tarefa"
                  required
                ></textarea>
              </div>
              <div class="row g-2 mb-3">
                <div class="col-6">
                  <label class="form-label">Prioridade</label>
                  <select id="prioridade" class="form-select">
                    <option value="" disabled selected>Escolher</option>
                    <option value="ALTA">Alta</option>
                    <option value="MEDIO">Médio</option>
                    <option value="BAIXO">Baixo</option>
                  </select>
                </div>
                <div class="col-6">
                  <label class="form-label">Prazo</label>
                  <input type="date" id="prazo" class="form-control" required />
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">Responsável</label>
                <select id="responsavel" class="form-select" required>
                  <option value="" disabled selected>Escolher</option>
                </select>
              </div>
              <button type="submit" class="btn btn-primary w-100 btn-animation">
                Adicionar Tarefa
              </button>
            </form>
          </div>
          <button
            class="btn btn-outline-primary w-100 mt-3 btn-animation"
            data-bs-toggle="modal"
            data-bs-target="#modalResponsaveis"
          >
            <i class="bi bi-person-plus me-1"></i>Cadastrar Novo Usuário
          </button>
        </div>

        <!-- Coluna lista/dashboard -->
        <div class="col-12 col-lg-8">
          <!-- Cards de métricas — 2 por linha em xs, 4 em sm+ -->
          <div class="row g-3 mb-4">
            <div class="col-6 col-sm-3">
              <div class="dashboard-card card p-2 text-center border-total">
                <h6 class="text-muted small">Total</h6>
                <h3 id="totalTxt" class="fw-bold text-primary mb-0">0</h3>
              </div>
            </div>
            <div class="col-6 col-sm-3">
              <div class="dashboard-card card p-2 text-center border-fazer">
                <h6 class="text-muted small">A Fazer</h6>
                <h3 id="afazerTxt" class="fw-bold text-secondary mb-0">0</h3>
              </div>
            </div>
            <div class="col-6 col-sm-3">
              <div class="dashboard-card card p-2 text-center border-andamento">
                <h6 class="text-muted small">Em Andamento</h6>
                <h3 id="andamentoTxt" class="fw-bold text-warning mb-0">0</h3>
              </div>
            </div>
            <div class="col-6 col-sm-3">
              <div class="dashboard-card card p-2 text-center border-concluida">
                <h6 class="text-muted small">Concluídas</h6>
                <h3 id="concluidasTxt" class="fw-bold text-success mb-0">0</h3>
              </div>
            </div>
          </div>

          <!-- Filtros -->
          <div class="card p-3 p-md-4 mb-3 card-animation filter-card">
            <!-- Cabeçalho do filtro -->
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
              <div class="d-flex align-items-center gap-2">
                <div class="filter-icon-wrap">
                  <i class="bi bi-funnel-fill"></i>
                </div>
                <div>
                  <h6 class="mb-0 fw-bold">Filtros</h6>
                  <small class="text-muted d-none d-sm-block">Refine por responsável, status ou período</small>
                </div>
              </div>
              <button onclick="limparFiltros()" class="btn btn-sm btn-outline-primary btn-animation filter-clear-btn">
                <i class="bi bi-x-circle me-1"></i>Limpar
              </button>
            </div>

            <hr class="filter-divider" />

            <!-- Controles de filtro -->
            <div class="row g-3 align-items-end">

              <!-- Linha 1: Responsável + Status -->
              <div class="col-12 col-sm-6">
                <label for="filtro-responsavel" class="filter-label">
                  <i class="bi bi-person me-1"></i>Responsável
                </label>
                <select id="filtro-responsavel" class="form-select filter-control" onchange="filtrarTarefas()">
                  <option value="">Todos os responsáveis</option>
                </select>
              </div>

              <div class="col-12 col-sm-6">
                <label for="filtro-status" class="filter-label">
                  <i class="bi bi-tag me-1"></i>Status
                </label>
                <select id="filtro-status" class="form-select filter-control" onchange="filtrarTarefas()">
                  <option value="">Todos os status</option>
                  <option value="A Fazer">A Fazer</option>
                  <option value="Em Andamento">Em Andamento</option>
                  <option value="Concluido">Concluído</option>
                </select>
              </div>

              <!-- Linha 2: Período (sempre largura total) -->
              <div class="col-12">
                <label class="filter-label">
                  <i class="bi bi-calendar-range me-1"></i>Período
                </label>
                <div class="filter-period-group">
                  <div class="input-group date-filter-group">
                    <span class="input-group-text filter-period-tag">De</span>
                    <input
                      type="date"
                      id="filtro-data-inicial"
                      class="form-control date-filter-input filter-control"
                      onchange="filtrarTarefasPorData()"
                      aria-label="Data inicial"
                    />
                  </div>
                  <span class="filter-period-arrow"><i class="bi bi-arrow-right"></i></span>
                  <div class="input-group date-filter-group">
                    <span class="input-group-text filter-period-tag">Até</span>
                    <input
                      type="date"
                      id="filtro-data-final"
                      class="form-control date-filter-input filter-control"
                      onchange="filtrarTarefasPorData()"
                      aria-label="Data final"
                    />
                  </div>
                </div>
              </div>

            </div>
          </div>

          <!-- Paginação -->
          <div id="paginacao" class="mb-3"></div>

          <!-- Lista de tarefas -->
          <div id="listaTarefas" class="row g-3"></div>
        </div>
      </div>
    </div>

    <!-- Modal Responsáveis (iframe) -->
    <div class="modal fade" id="modalResponsaveis" tabindex="-1" aria-labelledby="modalResponsaveisLabel" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-centered modal-fullscreen-md-down">
        <div class="modal-content overflow-hidden" style="height: 580px; max-height: 92dvh;">
          <iframe
            id="iframeResponsaveis"
            src=""
            style="width: 100%; height: 100%; border: none;"
            title="Cadastro de Responsáveis"
            tabindex="-1"
          ></iframe>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="Front/script.js"></script>
  </body>
</html>
