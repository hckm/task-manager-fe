<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador de Equipes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary: #4e73df; --success: #1cc88a; }
        body { background-color: #f8f9fc; font-family: 'Segoe UI', sans-serif; }
        .dashboard-card { border: none; border-left: 4px solid var(--primary); transition: 0.3s; }
        .dashboard-card:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .task-concluida { border-left-color: var(--success) !important; background-color: #f1fcf7; }
        .progress { height: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container py-5">
    <header class="text-center mb-5">
        <h1 class="display-4 fw-bold text-primary">Gerenciamento de tarefas em equipe.</h1>
        <p class="text-secondary">Organização de Projetos em Equipe</p>
    </header>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card p-4 shadow-sm">
                <h4 class="mb-3">Nova Tarefa</h4>
                <form id="taskForm">
                    <div class="mb-3">
                        <label class="form-label">Título da Tarefa</label>
                        <input type="text" id="titulo" class="form-control" placeholder="Função" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Responsável</label>
                        <select id="responsavel" class="form-select">
                            <option value="Lucas">Lucas</option>
                            <option value="Maria">Maria</option>
                            <option value="Emanuele">Emanuele</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Prioridade</label>
                        <select id="prioridade" class="form-select">
                            <option value="Alta">Alta</option>
                            <option value="Média">Média</option>
                            <option value="Baixa">Baixa</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Adicionar Tarefa</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="row mb-4">
                <div class="col-sm-6">
                    <div class="card p-3 shadow-sm border-0">
                        <h6 class="text-muted small">Progresso Geral</h6>
                        <h2 id="percentualTxt" class="text-success fw-bold">0%</h2>
                        <div class="progress"><div id="progressoBar" class="progress-bar bg-success" style="width: 0%"></div></div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="card p-3 shadow-sm border-0">
                        <h6 class="text-muted small">Total de Tarefas</h6>
                        <h2 id="totalTxt" class="fw-bold">0</h2>
                        <p id="concluidasTxt" class="mb-0 text-muted small">0 concluídas</p>
                    </div>
                </div>
            </div>

            <div id="listaTarefas" class="row g-3">
                </div>
        </div>
    </div>
</div>

<script>

class Usuario {
    #nome;
    constructor(nome) { this.#nome = nome; }
    getNome() { return this.#nome; }
}

class Tarefa {
    #titulo; #status;
    constructor(titulo, prioridade, responsavel) {
        this.#titulo = titulo;
        this.prioridade = prioridade;
        this.responsavel = responsavel;
        this.#status = "A Fazer";
    }
    getTitulo() { return this.#titulo; }
    getStatus() { return this.#status; }
    setStatus(s) { this.#status = s; }
}

class Gerenciador {
    constructor() { this.tarefas = []; }
    add(t) { this.tarefas.push(t); }
    getStats() {
        const total = this.tarefas.length;
        const done = this.tarefas.filter(t => t.getStatus() === "Concluido").length;
        const perc = total === 0 ? 0 : Math.round((done / total) * 100);
        return { total, done, perc };
    }
}

const app = new Gerenciador();


document.getElementById('taskForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const titulo = document.getElementById('titulo').value;
    const resp = document.getElementById('responsavel').value;
    const prio = document.getElementById('prioridade').value;

    const novaTarefa = new Tarefa(titulo, prio, new Usuario(resp));
    app.add(novaTarefa);
    
    this.reset();
    atualizarUI();
});

function atualizarUI() {
    const stats = app.getStats();
    document.getElementById('totalTxt').innerText = stats.total;
    document.getElementById('concluidasTxt').innerText = `${stats.done} concluídas`;
    document.getElementById('percentualTxt').innerText = `${stats.perc}%`;
    document.getElementById('progressoBar').style.width = `${stats.perc}%`;

    const lista = document.getElementById('listaTarefas');
    lista.innerHTML = '';

    app.tarefas.forEach((t, i) => {
        const isDone = t.getStatus() === "Concluido";
        lista.innerHTML += `
            <div class="col-12">
                <div class="card p-3 dashboard-card ${isDone ? 'task-concluida' : ''} shadow-sm d-flex flex-row justify-content-between align-items-center">
                    <div>
                        <h6 class="mb-0 fw-bold">${t.getTitulo()}</h6>
                        <small class="text-muted">${t.responsavel.getNome()} | Prioridade ${t.prioridade}</small>
                    </div>
                    ${!isDone ? `<button onclick="finalizar(${i})" class="btn btn-sm btn-outline-success">Concluir</button>` : '<span class="text-success fw-bold">✓</span>'}
                </div>
            </div>`;
    });
}

function finalizar(id) {
    app.tarefas[id].setStatus("Concluido");
    atualizarUI();
}
</script>

</body>
</html>
