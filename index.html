<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciador de Tarefas</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="Front/style.css" />
  </head>
  <body>
    <!--Cabeçalho-->
    <div class="container py-5">
      <header class="text-center mb-5">
        <h1 class="display-4 fw-bold text-primary">TaskFlow</h1>
        <p class="text-secondary">Gerenciamento de Tarefas em Equipe</p>
      </header>
      <!--Registro de Tarefa-->
      <div class="row g-4">
        <div class="col-md-4">
          <div class="card p-4 shadow-sm card-animation">
            <h4 class="mb-3">Nova Tarefa</h4>
            <form id="taskForm">
              <div class="mb-3">
                <label>Título da Tarefa</label>
                <input
                  type="text"
                  id="titulo"
                  class="form-control"
                  placeholder="Título"
                  required
                />
              </div>
              <div class="mb-3">
                <label>Descrição</label>
                <textarea
                  id="descricao"
                  class="form-control"
                  rows="2"
                  placeholder="Detalhes da Tarefa"
                  required
                ></textarea>
              </div>
              <div class="row">
                <div class="col-6">
                  <label>Prioridade</label>
                  <select id="prioridade" class="form-select">
                    <option value="" disabled selected>Escolher</option>
                    <option value="Alta">Alta</option>
                    <option value="Média">Média</option>
                    <option value="Baixa">Baixa</option>
                  </select>
                </div>
                <div class="col-6">
                  <label>Prazo</label>
                  <input type="date" id="prazo" class="form-control" required />
                </div>
              </div>
              <div class="mb-3 mt-3">
                <label>Responsável</label>
                <select id="responsavel" class="form-select" required>
                  <option value="" disabled selected>Escolher</option>
                </select>
              </div>
              <button type="submit" class="btn btn-primary w-100 btn-animation">
                Adicionar Tarefa
              </button>
            </form>
          </div>
          <button
            class="btn btn-outline-primary w-100 mt-3 btn-animation"
            data-bs-toggle="modal"
            data-bs-target="#modalUsuario"
          >
            Cadastrar Novo Usuário
          </button>
        </div>
        <!--Filtragem de Status-->
        <div class="col-md-8">
          <div class="row g-3 mb-4">
            <div class="col-sm-3">
              <div class="dashboard-card card p-2 text-center border-total">
                <h6 class="text-muted small">Total</h6>
                <h3 id="totalTxt" class="fw-bold text-primary">0</h3>
              </div>
            </div>
            <div class="col-sm-3">
              <div class="dashboard-card card p-2 text-center border-fazer">
                <h6 class="text-muted small">A Fazer</h6>
                <h3 id="afazerTxt" class="fw-bold text-secondary">0</h3>
              </div>
            </div>
            <div class="col-sm-3">
              <div class="dashboard-card card p-2 text-center border-andamento">
                <h6 class="text-muted small">Em Andamento</h6>
                <h3 id="andamentoTxt" class="fw-bold text-warning">0</h3>
              </div>
            </div>
            <div class="col-sm-3">
              <div class="dashboard-card card p-2 text-center border-concluida">
                <h6 class="text-muted small">Concluídas</h6>
                <h3 id="concluidasTxt" class="fw-bold text-success">0</h3>
              </div>
            </div>
          </div>
          <!--Progesso em Porcentagem-->
          <div class="card p-4 mb-4 card-animation">
            <div class="d-flex justify-content-between mb-2">
              <span class="fw-bold">Progresso Geral do Projeto</span>
              <span id="percentual-geral" class="fw-bold text-success">0%</span>
            </div>
            <div class="progress">
              <div
                id="progress-bar-geral"
                class="progress-bar bg-success"
                style="width: 0%"
              ></div>
            </div>
          </div>
          <!--Filtros -> Responsáveis - Status - Limpar-->
          <div class="card p-3 mb-3 card-animation">
            <div class="row g-2">
              <div class="col-md-5">
                <select
                  id="filtro-responsavel"
                  class="form-select"
                  onchange="filtrarTarefas()"
                >
                  <option value="">Todos os responsáveis</option>
                </select>
              </div>
              <div class="col-md-4">
                <select
                  id="filtro-status"
                  class="form-select"
                  onchange="filtrarTarefas()"
                >
                  <option value="">Todos os status</option>
                  <option value="A Fazer">A Fazer</option>
                  <option value="Em Andamento">Em Andamento</option>
                  <option value="Concluído">Concluído</option>
                </select>
              </div>
              <div class="col-md-3">
                <button
                  onclick="limparFiltros()"
                  class="btn btn-outline-primary w-100 btn-animation"
                >
                  Limpar
                </button>
              </div>
            </div>
          </div>
          <div id="listaTarefas" class="row g-3"></div>
        </div>
      </div>
    </div>
    <!--Cadastro de Usuário-->
    <div class="modal fade" id="modalUsuario" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5>Novo Usuário</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <input
              type="text"
              id="nome-usuario"
              class="form-control mb-3"
              placeholder="Nome completo"
            />
            <input
              type="email"
              id="email-usuario"
              class="form-control mb-3"
              placeholder="E-mail"
            />
            <select id="funcao-usuario" class="form-select">
              <option value="" disabled selected>Cargo</option>
              <option value="Desenvolvedor">Desenvolvedor</option>
              <option value="Designer">Designer</option>
              <option value="Gerente">Gerente</option>
            </select>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button onclick="adicionarUsuario()" class="btn btn-primary">
              Cadastrar
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="Front/script.js"></script>
  </body>
</html>
